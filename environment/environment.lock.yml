# Fully-pinned lock of the reflect-py314 development environment (Python 3.14,
# linux-64 / CUDA). Exact reproduction of the machine used during the internship.
#
#   conda env create -f environment/environment.lock.yml
#   conda activate reflect-py314
#
# This is the reproducibility snapshot. For a portable / cross-platform install
# that tracks pyproject.toml instead of frozen pins, use environment.yml.
# A few packages are sourced from Git rather than PyPI (e.g. OpenAI CLIP); if pip
# resolution fails on a different machine, prefer environment.yml.
